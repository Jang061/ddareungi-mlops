version: "3.9"

services:
  # MLflow 트래킹 서버
  mlflow:
    image: python:3.11-slim
    working_dir: /mlflow
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5000:5000"
    command: >
      bash -c "pip install mlflow==2.22.5 --quiet &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 추론 API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=ddareungi-lgbm
      - MODEL_ALIAS=staging
      - PYTHONIOENCODING=utf-8
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mlflow_data:
