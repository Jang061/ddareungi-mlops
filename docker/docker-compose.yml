version: "3.9"

services:
  # MLflow 트래킹 서버
  mlflow:
    image: python:3.11-slim
    working_dir: /mlflow
    volumes:
      - ../mlruns:/mlflow/mlruns
      - ../mlartifacts:/mlflow/mlartifacts
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_HOST=0.0.0.0
    command: >
      bash -c "pip install mlflow==2.22.5 --quiet &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlflow/mlruns
               --artifacts-destination /mlflow/mlartifacts
               --serve-artifacts
               --gunicorn-opts '--bind 0.0.0.0:5000'"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # FastAPI 추론 API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_NAME=ddareungi-lgbm
      - MODEL_ALIAS=staging
      - PYTHONIOENCODING=utf-8
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

